<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Showcasing my projects and work.">
    <title>My Projects</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            color: #31D53F;
            text-decoration: none;
        }
        p {
            text-align: center;
            font-size: 18px;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var backButton = document.querySelector('.back-button');
            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                this.style.color = '#31D53F';
                setTimeout(function() {
                    history.back();
                }, 400); // 400ms delay
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <a class="back-button" href="#">&lt;&lt; back</a>
        
        <h1>Showcase</h1>
        
        <p>Projects will be displayed here soon.</p>
    </div>
</body>
</html>
