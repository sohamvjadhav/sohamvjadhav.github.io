<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Showcasing my projects and work.">
    <title>My Projects</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #ffffff;  /* Updated to pure white */
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
            transition: color 0.4s;
        }
        .back-button:hover,
        .back-button:active {
            color: #31D53F;
            text-decoration: none;
        }
        p {
            font-size: 18px;
        }
    </style>
    <script>
        function delayNavigation(url, element) {
            element.style.color = '#31D53F';
            setTimeout(function() {
                window.location.href = url;
            }, 500); // 500ms delay
        }

        document.addEventListener('DOMContentLoaded', function() {
            var backButton = document.querySelector('.back-button');
            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                delayNavigation('javascript:history.back()', backButton);
            });

            var links = document.querySelectorAll('a:not(.back-button)');
            links.forEach(function(link) {
                link.addEventListener('click', function(event) {
                    event.preventDefault();
                    delayNavigation(link.href, link);
                });
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <a class="back-button" href="#">&lt;&lt; back</a>
        
        <h1>Showcase</h1>
        
        <p>Projects will be displayed here soon.</p>
    </div>
</body>
</html>
