<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover the projects and works of Soham Jadhav.">
    <title>Projects</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            text-decoration: none;
            color: #31D53F;
        }
        .content {
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .content p:hover,
        .content p:active {
            color: #31D53F;
        }
        h1:hover,
        h1:active {
            color: #31D53F;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-button" onclick="history.back()">&lt;&lt; back</a>
        
        <h1>Projects</h1>
        
        <div class="content">
            <p>No projects to display at the moment. Stay tuned for updates!</p>
        </div>
    </div>
</body>
</html>
