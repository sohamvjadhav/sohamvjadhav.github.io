<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me through various platforms.">
    <title>Contact Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            text-decoration: none;
            color: #31D53F;
        }
        .contact-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .contact-list li {
            display: inline;
        }
        .contact-list a {
            text-decoration: none;
            color: #0D50FF;
            font-size: 24px;
            transition: color 0.3s;
        }
        .contact-list a:hover,
        .contact-list a:active {
            color: #31D53F;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var links = document.querySelectorAll('.contact-list a');
            links.forEach(function(link) {
                link.addEventListener('click', function(event) {
                    event.preventDefault();
                    var href = this.getAttribute('href');
                    this.style.color = '#31D53F';
                    setTimeout(function() {
                        window.location.href = href;
                    }, 300); // 300ms delay
                });
            });
            var backButton = document.querySelector('.back-button');
            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                this.style.color = '#31D53F';
                setTimeout(function() {
                    history.back();
                }, 300); // 300ms delay
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <a class="back-button" href="#">&lt;&lt; back</a>
        <h1>Reach Out</h1>
        <ul class="contact-list">
            <li><a href="https://www.instagram.com/sohamvjadhav?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank"><i class="fab fa-instagram"></i></a></li>
            <li><a href="https://x.com/sohamvjadhav" target="_blank"><i class="fab fa-twitter"></i></a></li>
            <li><a href="mailto:jadhavsoham@icloud.com"><i class="fas fa-envelope"></i></a></li>
        </ul>
    </div>
</body>
</html>
