<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me through various platforms.">
    <title>Contact Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            color: #31D53F;
            text-decoration: none;
        }
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .contact-links a {
            color: #0D50FF;
            text-decoration: none;
            transition: color 0.4s;
        }
        .contact-links a:hover,
        .contact-links a:active {
            color: #31D53F;
        }
        .contact-links i {
            font-size: 36px;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var backButton = document.querySelector('.back-button');
            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                this.style.color = '#31D53F';
                setTimeout(function() {
                    history.back();
                }, 400); // 400ms delay
            });

            var links = document.querySelectorAll('.contact-links a');
            links.forEach(function(link) {
                link.addEventListener('click', function(event) {
                    event.preventDefault();
                    var href = this.getAttribute('href');
                    this.style.color = '#31D53F';
                    setTimeout(function() {
                        window.location.href = href;
                    }, 400); // 400ms delay
                });
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <a class="back-button" href="#">&lt;&lt; back</a>
        
        <h1>Reach Out</h1>
        
        <div class="contact-links">
            <a href="mailto:soham@example.com"><i class="fas fa-envelope"></i></a>
            <a href="https://linkedin.com/in/soham" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/soham" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://twitter.com/soham" target="_blank"><i class="fab fa-twitter"></i></a>
        </div>
    </div>
</body>
</html>
