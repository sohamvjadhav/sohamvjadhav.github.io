<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me through various platforms.">
    <title>Contact Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');
        
        body {
            font-family: 'Fira Code', monospace;
            background-color: #FFFFFF;  /* Updated to pure white */
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
            transition: color 0.4s;
        }
        .back-button:hover,
        .back-button:focus {
            color: #31D53F;
        }
        .contact-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .contact-list li {
            display: flex;
            align-items: center;
        }
        .contact-list li a {
            color: #0D50FF;
            text-decoration: none;
            transition: color 0.4s;
            display: flex;
            align-items: center;
        }
        .contact-list li a:hover,
        .contact-list li a:focus,
        .contact-list li a:visited {
            color: #31D53F;
        }
        .contact-list li i {
            font-size: 32px;
        }
        .contact-list li span {
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-button" onclick="history.back()">&lt;&lt; back</a>
        
        <h1>Contact Me</h1>
        
        <ul class="contact-list">
            <li>
                <a href="https://x.com/sohamvjadhav" target="_blank" aria-label="Twitter">
                    <i class="fab fa-twitter"></i>
                </a>
            </li>
            <li>
                <a href="https://www.instagram.com/sohamvjadhav?utm_source=ig_web_button_share_sheet&igshid=ZDNlZDc0MzIxNw==" target="_blank" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </li>
            <li>
                <a href="https://github.com/sohamvjadhav" target="_blank" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </li>
        </ul>
        <ul class="contact-list">
            <li>
                <a href="mailto:jadhavsoham@icloud.com" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                    <span>jadhavsoham@icloud.com</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
