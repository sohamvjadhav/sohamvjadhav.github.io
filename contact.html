<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Soham Jadhav.">
    <title>Contact</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            text-decoration: none;
            color: #31D53F;
        }
        .content {
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        p {
            margin-bottom: 20px;
        }
        a {
            color: #0D50FF;
            text-decoration: none;
        }
        a:hover,
        a:active {
            color: #31D53F;
            text-decoration: none;
        }
        h1:hover,
        h1:active {
            color: #31D53F;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-button" onclick="history.back()">&lt;&lt; back</a>
        
        <h1>Contact Me</h1>
        
        <div class="content">
            <p>If you'd like to get in touch, feel free to reach out to me via the following channels:</p>
            <p>Email: <a href="mailto:soham@example.com">soham@example.com</a></p>
            <p>LinkedIn: <a href="https://linkedin.com/in/sohamvjadhav" target="_blank">linkedin.com/in/sohamvjadhav</a></p>
            <p>Twitter: <a href="https://twitter.com/sohamvjadhav" target="_blank">@sohamvjadhav</a></p>
        </div>
    </div>
</body>
</html>
