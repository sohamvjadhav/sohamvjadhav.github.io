<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me through various platforms.">
    <title>Contact me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');
        
        body {
            font-family: 'Fira Code', monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
            transition: color 0.4s;
        }
        .back-button:hover,
        .back-button:focus {
            color: #31D53F;
        }
        .contact-list {
            list-style: none;
            padding: 0;
        }
        .contact-list li {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .contact-list li a {
            margin-left: 10px;
            color: #0D50FF;
            text-decoration: none;
            transition: color 0.4s;
        }
        .contact-list li a:hover,
        .contact-list li a:focus {
            color: #31D53F;
        }
        .contact-list li a:visited {
            color: #31D53F;
        }
        .contact-list li i {
            font-size: 24px;
            color: #0D50FF;
            transition: color 0.4s;
        }
        .contact-list li i:hover,
        .contact-list li i:focus {
            color: #31D53F;
        }
    </style>
</head>
<body>
