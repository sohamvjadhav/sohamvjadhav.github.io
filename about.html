<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn more about me and my interests.">
    <title>About Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body {
            font-family: 'Fira Code', monospace;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #0D50FF;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .back-button {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0D50FF;
            cursor: pointer;
            font-weight: normal;
        }
        .back-button:hover,
        .back-button:active {
            color: #31D53F;
            text-decoration: none;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 10px;
        }
    </style>
    <script>
        function delayNavigation(url, element) {
            element.style.color = '#31D53F';
            setTimeout(function() {
                window.location.href = url;
            }, 500); // 500ms delay
        }

        document.addEventListener('DOMContentLoaded', function() {
            var backButton = document.querySelector('.back-button');
            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                delayNavigation('javascript:history.back()', backButton);
            });

            var links = document.querySelectorAll('a:not(.back-button)');
            links.forEach(function(link) {
                link.addEventListener('click', function(event) {
                    event.preventDefault();
                    delayNavigation(link.href, link);
                });
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <a class="back-button" href="#">&lt;&lt; back</a>
        
        <h1>Bio</h1>
        
        <ul>
            <li>I'm Soham Jadhav.</li>
            <li>I'm 20 years old.</li>
            <li>I'm an interdisciplinary explorer.</li>
            <li>I have a keen interest in tech and Machine Learning.</li>
        </ul>
    </div>
</body>
</html>
