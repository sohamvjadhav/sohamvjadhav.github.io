<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Soham's page showcasing his details, projects, and contact information.">
    <title>Soham's Tech Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        body {
            font-family: 'Fira Code', monospace;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #0D50FF;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        nav {
            text-align: center;
            font-size: 18px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #0D50FF;
            transition: color 0.4s, text-decoration 0.4s, transform 0.4s;
        }
        nav a:hover {
            color: #31D53F;
            text-decoration: underline;
            transform: scale(1.05);
        }
        .sliding-text-container {
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }
        .sliding-text {
            display: inline-block;
            white-space: nowrap;
            animation: slide 20s linear infinite;
        }
        @keyframes slide {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .sliding-text a {
            color: #0D50FF;
            text-decoration: none;
            transition: all 0.4s ease;
        }
        .sliding-text a:hover {
            text-decoration: underline;
            color: #31D53F;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const links = document.querySelectorAll('nav a');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    setTimeout(() => {
                        window.location.href = this.href;
                    }, 400);
                });
            });
        });
    </script>
</head>
<body>
    <h1>Je suis Soham</h1>
    <nav aria-label="Main Navigation">
        <div class="nav-links">
            <a href="about.html">Bio</a> |
            <a href="projects.html">Showcase</a>
        </div>
        <div class="nav-links">
            <a href="contact.html">Reach Out</a> |
            <a href="updates.html">Updates & Milestones</a>
        </div>
    </nav>
    <div class="sliding-text-container">
        <div class="sliding-text">
            <span>Follow on <a href="https://x.com/sohamvjadhav" target="_blank">x.com/Twitter</a> for the earliest updates.</span>
        </div>
    </div>
</body>
</html>
